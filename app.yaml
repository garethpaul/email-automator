# application name (from appengine)
application: email-automator
version: 1
runtime: python27
api_version: 1
threadsafe: yes

# main handlers
handlers:
- url: /auth
  script: main.app
  login: required
  secure: always
- url: /mail/me
  script: main.app
  login: admin
  secure: always
- url: /mail/.*
  script: main.app
  login: required
  secure: always
- url: .*
  script: main.app
  login: required
  secure: always

# libraries used - https://cloud.google.com/appengine/docs/python/tools/libraries27
libraries:
- name: webapp2
  version: "2.5.2"
- name: jinja2
  version: latest
